version: 2
updates:
  # Pub dependencies (Flutter/Dart)
  - package-ecosystem: "pub"
    directory: "/timer_mowcy"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "pub"
    commit-message:
      prefix: "chore"
      include: "scope"

  # GitHub Actions workflow dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "github-actions"
    commit-message:
      prefix: "chore"
      include: "scope"
