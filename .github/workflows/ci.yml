name: CI

on:
  push:
    branches: [main, public-release-clean]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Analyze + Test (Flutter ${{ matrix.flutter }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flutter: ["3.35.7"]

    defaults:
      run:
        working-directory: timer_mowcy

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ matrix.flutter }}
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib/ test/

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Upload coverage
        if: matrix.flutter == '3.35.7'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: timer_mowcy/coverage/

  build:
    name: Build release APK
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    defaults:
      run:
        working-directory: timer_mowcy

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.35.7"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build split-per-ABI release APKs
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: |
            timer_mowcy/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            timer_mowcy/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            timer_mowcy/build/app/outputs/flutter-apk/app-x86_64-release.apk
