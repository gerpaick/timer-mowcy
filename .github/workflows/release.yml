name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build APKs and publish GitHub Release
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: timer_mowcy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.35.7"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib/ test/

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build split-per-ABI release APKs
        run: flutter build apk --release --split-per-abi

      - name: Generate checksums
        run: |
          cd build/app/outputs/flutter-apk
          sha256sum app-*-release.apk > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload APKs + checksums to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
            build/app/outputs/flutter-apk/SHA256SUMS.txt
          generate_release_notes: true
          draft: false
          prerelease: false
