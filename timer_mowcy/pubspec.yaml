name: timer_mowcy
description: "Open-source timer + stopwatch for speakers, trainers, and debaters. Works offline. No ads. No accounts."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.9
  shared_preferences: ^2.3.2
  flutter_colorpicker: ^1.1.0
  wakelock_plus: ^1.4.0
  vibration: ^3.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon_source.png"

flutter:
  uses-material-design: true
  generate: true
